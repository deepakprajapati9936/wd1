<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Animated Cartoon Man — Registration Form</title>
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --accent:#4f46e5; --glass: rgba(255,255,255,0.06);
      --muted: rgba(255,255,255,0.72);
      --success: #10b981;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Arial; background:linear-gradient(180deg,#071226 0%, #0f1724 100%);
      color:#e6eef8; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
      display:flex; align-items:center; justify-content:center; min-height:100vh; padding:32px;
    }

    .wrap{
      width:100%; max-width:980px; display:grid; grid-template-columns: 420px 1fr; gap:28px; align-items:center;
    }

    /* Card */
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border-radius:16px; padding:28px; box-shadow: 0 8px 30px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.04)}

    /* Left: animated man */
    .stage{display:flex; align-items:center; justify-content:center; height:100%; padding:6px}
    .cartoon-scene{width:320px; height:420px; display:flex; align-items:center; justify-content:center; position:relative}

    /* Simple ground */
    .ground{position:absolute; bottom:28px; left:50%; transform:translateX(-50%); width:80%; height:20px; background:linear-gradient(90deg, rgba(79,70,229,0.15), rgba(16,185,129,0.06)); border-radius:999px; box-shadow:0 6px 18px rgba(79,70,229,0.06) inset}

    /* SVG container responsive */
    .cartoon{width:260px; height:auto;}

    /* waving arm animation via CSS targetting SVG groups */
    .arm-wave{transform-origin: 20% 20%; animation: wave 1.6s ease-in-out infinite}
    @keyframes wave{ 0%{transform:rotate(0deg)} 30%{transform:rotate(18deg)} 60%{transform:rotate(-12deg)} 100%{transform:rotate(0deg)} }

    /* head bob */
    .head-bob{transform-origin:center; animation: bob 3.6s ease-in-out infinite}
    @keyframes bob{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)} }

    /* blink */
    .eye{animation: blink 5s steps(2, end) infinite}
    @keyframes blink{0%,90%{transform:scaleY(1)}92%{transform:scaleY(0.05)}100%{transform:scaleY(1)}}

    /* form */
    form{display:flex; flex-direction:column; gap:12px}
    h2{margin:0 0 4px 0; font-size:20px}
    p.lead{margin:0 0 12px 0; color:var(--muted); font-size:13px}

    .row{display:flex; gap:12px}
    .col{flex:1}

    label{font-size:12px; color:var(--muted); display:block; margin-bottom:6px}
    input[type="text"], input[type="email"], input[type="password"], input[type="date"], select, textarea{
      width:100%; padding:12px 14px; border-radius:10px; background:var(--glass); border:1px solid rgba(255,255,255,0.04); color:inherit; outline:none; transition:box-shadow .18s, transform .12s;
    }
    input:focus, select:focus, textarea:focus{ box-shadow:0 6px 20px rgba(79,70,229,0.12); transform:translateY(-1px); }

    .cta{display:flex; gap:10px; align-items:center; margin-top:6px}
    .btn{background:linear-gradient(90deg,var(--accent), #06b6d4); color:white; padding:12px 16px; border-radius:10px; border:none; cursor:pointer; font-weight:600}
    .btn.ghost{background:transparent; border:1px solid rgba(255,255,255,0.06); color:var(--muted)}

    .note{font-size:12px; color:var(--muted)}

    /* small responsive */
    @media(max-width:900px){.wrap{grid-template-columns:1fr; max-width:720px} .cartoon-scene{height:300px} }

    /* success animation */
    .success{display:none; align-items:center; gap:12px; padding:16px; border-radius:10px; background:linear-gradient(90deg, rgba(16,185,129,0.08), rgba(79,70,229,0.03)); color:var(--success)}
    .success.show{display:flex}

    /* small flourish for inputs */
    .field-hint{font-size:11px; color:rgba(255,255,255,0.45)}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="stage">
        <div class="cartoon-scene">
          <!-- SVG Cartoon Man (simple friendly character) -->
          <svg class="cartoon" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- body shadow -->
            <ellipse cx="100" cy="286" rx="64" ry="12" fill="rgba(2,6,23,0.6)" />

            <!-- legs -->
            <g id="legs" transform="translate(0,40)">
              <rect x="74" y="198" width="14" height="44" rx="6" fill="#263544" />
              <rect x="112" y="198" width="14" height="44" rx="6" fill="#263544" />
            </g>

            <!-- body torso -->
            <g id="torso">
              <rect x="64" y="120" width="72" height="92" rx="18" fill="#4f46e5" />
            </g>

            <!-- left arm (waving) -->
            <g class="arm-wave" transform="translate(0,0)">
              <path d="M60 132 C36 140, 36 172, 60 180" fill="#4f46e5" stroke="none" />
              <circle cx="56" cy="188" r="9" fill="#fcd34d" />
            </g>

            <!-- right arm -->
            <g transform="translate(0,0)">
              <path d="M136 132 C160 140, 160 172, 136 180" fill="#4f46e5" stroke="none" />
              <circle cx="140" cy="188" r="9" fill="#fcd34d" />
            </g>

            <!-- head with bobbing -->
            <g class="head-bob" transform="translate(0,-4)">
              <circle cx="100" cy="76" r="44" fill="#fde68a" />
              <!-- hair -->
              <path d="M70 64 Q100 40 130 64" fill="#1f2937" />

              <!-- eyes -->
              <g fill="#0f1724">
                <ellipse class="eye" cx="86" cy="76" rx="5" ry="4" />
                <ellipse class="eye" cx="114" cy="76" rx="5" ry="4" />
              </g>

              <!-- smile -->
              <path d="M82 92 Q100 105 118 92" stroke="#0f1724" stroke-width="3" fill="transparent" stroke-linecap="round" />

              <!-- blush -->
              <ellipse cx="78" cy="86" rx="6" ry="3.5" fill="rgba(239,68,68,0.12)" />
              <ellipse cx="122" cy="86" rx="6" ry="3.5" fill="rgba(239,68,68,0.12)" />
            </g>

          </svg>

          <div class="ground"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Create your account</h2>
      <p class="lead">Quick, friendly sign up — our cartoon friend will welcome you! ✨</p>

      <form id="regForm" autocomplete="off">
        <div class="row">
          <div class="col">
            <label for="fname">First name</label>
            <input id="fname" name="fname" type="text" placeholder="Amit" required />
          </div>
          <div class="col">
            <label for="lname">Last name</label>
            <input id="lname" name="lname" type="text" placeholder="Shah" required />
          </div>
        </div>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <div class="row">
          <div class="col">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="8+ characters" minlength="8" required />
            <div class="field-hint">At least 8 characters</div>
          </div>
          <div class="col">
            <label for="dob">Date of birth</label>
            <input id="dob" name="dob" type="date" />
          </div>
        </div>

        <label>Gender</label>
        <div class="row">
          <label style="font-size:13px"><input type="radio" name="gender" value="m" checked /> Male</label>
          <label style="font-size:13px"><input type="radio" name="gender" value="f" /> Female</label>
          <label style="font-size:13px"><input type="radio" name="gender" value="o" /> Other</label>
        </div>

        <label for="about">About you (optional)</label>
        <textarea id="about" name="about" rows="3" placeholder="Tell us something about you..." ></textarea>

        <div class="cta">
          <button type="submit" class="btn">Sign up</button>
          <button type="button" class="btn ghost" onclick="resetForm()">Reset</button>
        </div>

        <p class="note">By signing up you agree to our <u>Terms</u> and <u>Privacy</u>.</p>

        <div id="success" class="success" role="status" aria-live="polite">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M20 6L9 17l-5-5" /></svg>
          <div>Account created — welcome aboard!</div>
        </div>

      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('regForm');
    const successBox = document.getElementById('success');

    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      // basic front-end validation
      const password = form.password.value;
      if(password.length < 8){
        alert('Password must be at least 8 characters');
        form.password.focus();
        return;
      }

      // simulate success
      successBox.classList.add('show');

      // little celebratory animation on the cartoon (shake)
      const cartoon = document.querySelector('.cartoon-scene');
      cartoon.animate([
        { transform: 'translateY(0)' },
        { transform: 'translateY(-8px)' },
        { transform: 'translateY(0)' }
      ], { duration: 420, iterations: 1, easing: 'ease-out' });

      // disable submit briefly
      form.querySelector('.btn').disabled = true;
      setTimeout(()=>{
        form.reset();
        form.querySelector('.btn').disabled = false;
      },1200);
    });

    function resetForm(){
      document.getElementById('regForm').reset();
      document.getElementById('success').classList.remove('show');
    }
  </script>
</body>
</html>
